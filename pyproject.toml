[tool.ruff]
line-length = 88
target-version = "py313"
# Migrations klasörünü tarama
exclude = ["**/migrations/*.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N"]
ignore = ["E501"] # Satır uzunluğu hatasını Ruff'ın raporlamasını kapatıyoruz (Black zaten hallediyor)

[tool.ruff.lint.isort]
known-first-party = ["ideas", "users", "config"]
