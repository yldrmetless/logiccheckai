name: Django CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: logiccheck_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # CI için gerekli araçları ve eksik olabilecek paketleri yükle
        pip install ruff pytest pytest-django pytest-cov python-dotenv groq

    - name: Run Ruff Check
      run: ruff check .

    - name: Run Tests with Coverage
      env:
        DB_NAME: logiccheck_db
        DB_USER: user
        DB_PASSWORD: password
        DB_HOST: localhost
        DB_PORT: 5432
        DJANGO_SETTINGS_MODULE: config.settings
        SECRET_KEY: "temporary-secret-key-for-tests"
        GROQ_API_KEY: "mock-key-for-tests"
      run: |
        pytest --cov=. --cov-fail-under=70
