name: Django CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: logiccheck_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest pytest-django pytest-cov

    - name: Run Ruff Check
      run: ruff check .

    - name: Run Tests with Coverage
      env:
        # GitHub Actions ortamı için geçici veritabanı ayarları
        DATABASE_URL: postgres://user:password@localhost:5432/logiccheck_db
        DJANGO_SETTINGS_MODULE: config.settings
        SECRET_KEY: "temporary-secret-key-for-tests"
      run: |
        pytest --cov=. --cov-fail-under=70
